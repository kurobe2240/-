<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1a2535" />
  <title>設定</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=13" />
</head>
<body class="page-root">
  <div class="bg-wm" aria-hidden="true"></div>
  <div class="app app-shell">
    <div class="app-scroll">
      <header class="header">
        <div class="header-actions">
          <a class="btn sm ghost" href="./index.html">戻る</a>
        </div>
        <div class="clock-block" aria-live="polite">
          <span class="clock-label">設定</span>
          <time class="clock">CONFIG</time>
          <span class="clock-date">保存すると自動反映</span>
        </div>
      </header>

      <section class="panel" aria-label="設定">
        <div class="settings surface" aria-label="設定">
          <div class="settings-row">
            <div class="settings-item">
              <div class="settings-label">一口（円）</div>
              <input type="number" id="unit-price" class="settings-input mono" min="1" step="1000" value="100000" />
            </div>
            <div class="settings-item">
              <div class="settings-label">控除率（%）</div>
              <input type="number" id="house-edge" class="settings-input mono" min="0" max="50" step="0.1" value="0" />
            </div>
            <div class="settings-actions">
              <button type="button" id="settings-apply" class="btn sm primary">適用</button>
              <button type="button" id="settings-reset" class="btn sm ghost">リセット</button>
              <button type="button" id="settings-lock" class="btn sm">ロック</button>
            </div>
          </div>
          <div class="settings-note" id="settings-note">※表示・計算の設定（シミュレーション）</div>
        </div>
      </section>

      <footer class="footer">
        <p class="version">v2</p>
      </footer>
    </div>
  </div>
  <script src="js/settings.js?v=1"></script>
</body>
</html>
