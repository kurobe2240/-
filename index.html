<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="赤・青コーナーの口数から人気・オッズ・払戻目安を表示（配信用）" />
  <meta name="theme-color" content="#1a2535" />
  <title>投票</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=6" />
</head>
<body class="page-root">
  <div class="app app-shell">
    <header class="header">
      <div class="clock-block" aria-live="polite">
        <span class="clock-label">現在時刻</span>
        <time id="clock" class="clock">--:--:--</time>
        <span id="clock-date" class="clock-date"></span>
      </div>
    </header>

    <section class="panel" aria-label="タイマー">
      <div class="timer-grid">
        <div class="card surface">
          <h3>ストップウォッチ</h3>
          <p class="mono big" id="sw-display">00:00.00</p>
          <div class="btn-row">
            <button type="button" id="sw-start" class="btn primary">開始</button>
            <button type="button" id="sw-lap" class="btn">ラップ</button>
            <button type="button" id="sw-reset" class="btn ghost">リセット</button>
          </div>
          <ul id="sw-laps" class="laps"></ul>
        </div>
        <div class="card surface">
          <h3>カウントダウン</h3>
          <div class="cd-inputs">
            <label>分 <input type="number" id="cd-min" min="0" max="599" value="5" /></label>
            <label>秒 <input type="number" id="cd-sec" min="0" max="59" value="0" /></label>
          </div>
          <p class="mono big" id="cd-display">05:00</p>
          <div class="btn-row">
            <button type="button" id="cd-start" class="btn primary">開始</button>
            <button type="button" id="cd-pause" class="btn" disabled>一時停止</button>
            <button type="button" id="cd-reset" class="btn ghost">リセット</button>
          </div>
        </div>
      </div>
    </section>

    <section class="panel" aria-label="コーナー投票">
      <div class="panel-head">
        <div class="panel-actions">
          <button type="button" id="reset-corners" class="btn ghost sm">リセット</button>
          <button type="button" id="export-json" class="btn sm">保存</button>
          <label class="btn sm file-label">読込<input type="file" id="import-json" accept="application/json,.json" /></label>
        </div>
      </div>
      <p id="save-status" class="save-status" aria-live="polite"></p>

      <div class="unit-price-banner surface">
        <span class="unit-price-label">一口</span>
        <span class="unit-price-value mono">100,000</span>
        <span class="unit-price-yen">円</span>
      </div>

      <div class="corner-grid">
        <div class="corner-card corner-red surface glass-card">
          <div class="corner-card-head">
            <h3 class="corner-title">赤コーナー</h3>
            <p class="pop-badge" id="red-badge" aria-live="polite">—</p>
          </div>
          <div class="corner-main-row">
            <div class="corner-left">
              <span class="corner-input-label">口数</span>
              <input type="number" id="red-units" class="corner-input mono" min="0" step="1" value="0" inputmode="numeric" />
              <div class="stepper" aria-label="赤 口数操作">
                <button type="button" class="btn sm step-btn" data-side="red" data-delta="-10">-10</button>
                <button type="button" class="btn sm step-btn" data-side="red" data-delta="-5">-5</button>
                <button type="button" class="btn sm step-btn" data-side="red" data-delta="-1">-1</button>
                <button type="button" class="btn sm step-btn" data-side="red" data-delta="+1">+1</button>
                <button type="button" class="btn sm step-btn" data-side="red" data-delta="+5">+5</button>
                <button type="button" class="btn sm step-btn" data-side="red" data-delta="+10">+10</button>
              </div>
            </div>
            <div class="corner-right">
              <div class="stat">
                <div class="stat-label">オッズ</div>
                <div id="red-odds" class="stat-value mono">—</div>
              </div>
              <div class="stat">
                <div class="stat-label">購入金額</div>
                <div class="stat-value mono"><span id="red-yen">0</span> 円</div>
              </div>
            </div>
          </div>
          <p class="corner-pct mono" id="red-pct">—</p>
          <p class="payout-est">
            <span class="payout-est-label">勝利時 一口払戻</span>
            <span id="red-payout-est" class="mono payout-est-value">—</span>
            <span class="payout-est-yen">円</span>
          </p>
        </div>
        <div class="corner-card corner-blue surface glass-card">
          <div class="corner-card-head">
            <h3 class="corner-title">青コーナー</h3>
            <p class="pop-badge" id="blue-badge" aria-live="polite">—</p>
          </div>
          <div class="corner-main-row">
            <div class="corner-left">
              <span class="corner-input-label">口数</span>
              <input type="number" id="blue-units" class="corner-input mono" min="0" step="1" value="0" inputmode="numeric" />
              <div class="stepper" aria-label="青 口数操作">
                <button type="button" class="btn sm step-btn" data-side="blue" data-delta="-10">-10</button>
                <button type="button" class="btn sm step-btn" data-side="blue" data-delta="-5">-5</button>
                <button type="button" class="btn sm step-btn" data-side="blue" data-delta="-1">-1</button>
                <button type="button" class="btn sm step-btn" data-side="blue" data-delta="+1">+1</button>
                <button type="button" class="btn sm step-btn" data-side="blue" data-delta="+5">+5</button>
                <button type="button" class="btn sm step-btn" data-side="blue" data-delta="+10">+10</button>
              </div>
            </div>
            <div class="corner-right">
              <div class="stat">
                <div class="stat-label">オッズ</div>
                <div id="blue-odds" class="stat-value mono">—</div>
              </div>
              <div class="stat">
                <div class="stat-label">購入金額</div>
                <div class="stat-value mono"><span id="blue-yen">0</span> 円</div>
              </div>
            </div>
          </div>
          <p class="corner-pct mono" id="blue-pct-text">—</p>
          <p class="payout-est">
            <span class="payout-est-label">勝利時 一口払戻</span>
            <span id="blue-payout-est" class="mono payout-est-value">—</span>
            <span class="payout-est-yen">円</span>
          </p>
        </div>
      </div>

      <div class="pop-visual surface" aria-label="人気の割合">
        <div class="pop-bar-track" role="img" aria-label="赤と青の割合">
          <div class="pop-bar-seg pop-bar-red" id="bar-red"></div>
          <div class="pop-bar-seg pop-bar-blue" id="bar-blue"></div>
        </div>
        <div class="pop-bar-legend">
          <span class="legend-red"><span class="legend-dot"></span> 赤 <strong id="legend-red-pct">0</strong>%</span>
          <span class="legend-blue"><span class="legend-dot"></span> 青 <strong id="legend-blue-pct">0</strong>%</span>
        </div>
      </div>

      <p class="total-line surface">
        合計 <strong id="total-units" class="mono">0</strong> 口
        · 合計金額 <strong id="total-yen" class="mono">0</strong> 円
      </p>
    </section>

    <footer class="footer">
      <p class="version">v2</p>
    </footer>
  </div>
  <noscript><p class="noscript">JavaScript を有効にすると利用できます。</p></noscript>
  <script src="js/app.js?v=4"></script>
</body>
</html>
